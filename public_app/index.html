<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>The Slayers — Signal Center</title>
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Slayers">
<link rel="manifest" href="/app/manifest.json">
<link rel="apple-touch-icon" href="/app/icon-192.png">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin: 0; background: #000; font-family: -apple-system, Helvetica, Arial, sans-serif; }
  #app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
  .pill { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; border-radius: 99px; padding: 4px 10px; border: 1px solid; }
  .panel { background: #0B0F14; border: 1px solid #1B2430; border-radius: 16px; padding: 18px; margin-bottom: 14px; }
  .heading { font-weight: 900; text-transform: uppercase; letter-spacing: -0.5px; color: #F2F4F3; }
  .row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; }
  .glow-mint { text-shadow: 0 0 18px rgba(62,207,142,0.4), 0 0 40px rgba(62,207,142,0.2); }
  .ticker-track { display: inline-block; white-space: nowrap; animation: scrollTicker 22s linear infinite; }
  @keyframes scrollTicker { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .navbtn { flex: 1; padding: 14px 0; background: none; border: none; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; color: #7C8A87; }
  .navbtn.active { color: #3ECF8E; }
  .navbtn svg { width: 19px; height: 19px; }
  .signal-card { cursor: pointer; }
  .skeleton { background: linear-gradient(90deg, #0B0F14 25%, #141a21 50%, #0B0F14 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; border-radius: 12px; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  a { text-decoration: none; }
  button { font-family: inherit; }
</style>
</head>
<body>
<div id="app"></div>
<script src="/app/app.js"></script>
</body>
</html>
